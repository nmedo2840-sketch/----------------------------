<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Store</title>

<style>

body{
font-family:Arial;
background:#0b0b0b;
color:white;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.card{
background:#1c1c1c;
padding:10px;
border-radius:10px;
}

img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
cursor:pointer;
}

.cart{
position:fixed;
bottom:10px;
right:10px;
background:#222;
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>🛒 المنتجات</h2>

<div class="grid" id="products"></div>

<div class="cart">
<button onclick="checkout()">📲 اطلب الآن واتساب</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products") || "[]");
let cart = [];

function render(){

let html="";

products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} جنيه</p>
<button onclick="add(${i})">أضف للسلة</button>
</div>
`;
});

document.getElementById("products").innerHTML=html;
}

function add(i){
cart.push(products[i]);
alert("تمت الإضافة 🛒");
}

function checkout(){

let msg="طلب جديد:%0A";

let total=0;

cart.forEach(p=>{
msg+=`- ${p.name} (${p.price})%0A`;
total+=Number(p.price);
});

msg+=`%0Aالإجمالي: ${total} جنيه`;

let phone="201279468804";

window.open(`https://wa.me/${phone}?text=${msg}`,"_blank");
}

render();

</script>

</body>
</html>
