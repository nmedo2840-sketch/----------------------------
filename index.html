<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRUZO | Luxury Viral Box</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#070707;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
radial-gradient(circle at top,#ff4d6d33,transparent 40%),
radial-gradient(circle at bottom,#00ffd533,transparent 40%);
}

.hero h1{
font-size:60px;
margin:0;
}

.hero p{
opacity:.7;
margin-top:10px;
}

.btn{
margin-top:20px;
padding:15px 35px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#ff5f7e,#ff9966);
color:white;
font-weight:900;
cursor:pointer;
}

/* STORE */

.container{
display:grid;
grid-template-columns:1fr 420px;
gap:20px;
padding:30px;
}

/* PRODUCTS */

.card{
background:#151515;
padding:15px;
border-radius:20px;
margin-bottom:10px;
transition:.3s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
border-radius:15px;
height:140px;
object-fit:cover;
}

.card button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00ffd5,#00b4ff);
color:white;
font-weight:bold;
cursor:pointer;
}

/* BOX */

.box{
width:320px;
height:320px;
background:#111;
border-radius:25px;
position:relative;
overflow:hidden;
box-shadow:0 30px 60px rgba(0,0,0,.6);
}

.inside{
position:absolute;
inset:15px;
display:flex;
flex-wrap:wrap;
gap:6px;
align-content:flex-start;
padding:10px;
background:#0e0e0e;
border-radius:15px;
}

.inside img{
width:45px;
height:45px;
object-fit:contain;
}

.wrap{
position:absolute;
inset:0;
opacity:.85;
}

/* CART */

.cart{
margin-top:10px;
color:#ffd166;
font-weight:bold;
}

.checkout{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff5f7e,#ff9966);
color:white;
font-weight:900;
cursor:pointer;
}

</style>

</head>

<body>

<!-- HERO (VIRAL PART) -->
<div class="hero">

<h1>🍓 اصنع بوكسك الفاخر</h1>
<p>Luxury Experience — Viral Design — Premium Delivery</p>

<button class="btn" onclick="document.getElementById('shop').scrollIntoView({behavior:'smooth'})">
ابدأ التصميم
</button>

</div>

<!-- STORE -->
<div class="container" id="shop">

<!-- LEFT -->
<div>

<div class="card">
<img src="https://images.unsplash.com/photo-1464965911861-746a04b4bca6">
<h3>فراولة</h3>
<button onclick="add('https://pngimg.com/d/strawberry_PNG2593.png',45)">إضافة</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1553279768-865429fa0078">
<h3>مانجو</h3>
<button onclick="add('https://pngimg.com/d/mango_PNG9168.png',55)">إضافة</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1536511132770-e5058c7e8c46">
<h3>عنب</h3>
<button onclick="add('https://pngimg.com/d/grape_PNG2993.png',60)">إضافة</button>
</div>

<div class="card">
<h3>🎁 تغليف فاخر</h3>
<button onclick="wrap()">اختيار تغليف</button>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="box">

<div class="inside" id="inside"></div>

<img id="wrapImg" class="wrap">

</div>

<div class="cart">
💰 الإجمالي: <span id="total">0</span>
</div>

<button class="checkout" onclick="order()">
اطلب الآن على واتساب 📲
</button>

</div>

</div>

<script>

let total=0;

function add(img,price){

let el=document.createElement("img");
el.src=img;

document.getElementById("inside").appendChild(el);

total+=price;
update();
}

function wrap(){
document.getElementById("wrapImg").src =
"https://pngimg.com/d/gift_PNG5953.png";

total+=120;
update();
}

function update(){
document.getElementById("total").innerText=total;
}

function order(){

let msg="🛒 طلب FRUZO:%0A";
msg+=`الإجمالي: ${total} جنيه`;

window.open(
`https://wa.me/201279468804?text=${msg}`,
"_blank"
);
}

</script>

</body>
</html>
