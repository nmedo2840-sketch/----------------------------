<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Your Box | FRUZO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo',sans-serif;
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
radial-gradient(circle at top,#ff4d6d33,transparent 40%),
radial-gradient(circle at bottom,#00ffd533,transparent 40%);
}

.hero h1{
font-size:55px;
margin:0;
}

.hero p{
opacity:.7;
}

.btn{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#ff5f7e,#ff9966);
color:white;
font-weight:900;
cursor:pointer;
}

/* LAYOUT */

.container{
display:grid;
grid-template-columns:1fr 420px;
gap:20px;
padding:30px;
}

/* PRODUCTS */

.card{
background:#161616;
padding:15px;
border-radius:20px;
margin-bottom:10px;
transition:.3s;
}

.card:hover{
transform:scale(1.02);
}

.card button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00ffd5,#00b4ff);
color:white;
font-weight:bold;
cursor:pointer;
}

/* BOX */

.stage{
perspective:1200px;
height:520px;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:320px;
height:320px;
position:relative;
border-radius:25px;
background:linear-gradient(145deg,#2a2a2a,#111);
box-shadow:0 30px 60px rgba(0,0,0,.6);
overflow:hidden;
transform:rotateX(12deg) rotateY(12deg);
transition:.8s;
}

/* LID */

.lid{
position:absolute;
top:0;
width:100%;
height:100%;
background:#333;
transition:.8s;
transform-origin:top;
z-index:3;
}

.box.open .lid{
transform:rotateX(150deg);
}

/* INSIDE */

.inside{
position:absolute;
inset:15px;
display:flex;
flex-wrap:wrap;
gap:6px;
align-content:flex-start;
padding:10px;
background:#0e0e0e;
border-radius:15px;
}

.inside img{
width:45px;
height:45px;
object-fit:contain;
}

/* WRAP */

.wrap{
position:absolute;
inset:0;
z-index:4;
opacity:.85;
}

.cart{
margin-top:10px;
color:#ffd166;
font-weight:bold;
}

.checkout{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff5f7e,#ff9966);
color:white;
font-weight:900;
cursor:pointer;
}

</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>🍓 Build Your Luxury Box</h1>
<p>اصنع بوكسك بنفسك وشوفه قدامك قبل ما تطلبه</p>
<button class="btn" onclick="document.getElementById('shop').scrollIntoView({behavior:'smooth'})">
ابدأ التصميم
</button>
</div>

<!-- SHOP -->
<div class="container" id="shop">

<!-- LEFT -->
<div>

<div class="card">
<h3>🍓 فراولة</h3>
<button onclick="add('https://pngimg.com/d/strawberry_PNG2593.png',45)">إضافة</button>
</div>

<div class="card">
<h3>🥭 مانجو</h3>
<button onclick="add('https://pngimg.com/d/mango_PNG9168.png',55)">إضافة</button>
</div>

<div class="card">
<h3>🍇 عنب</h3>
<button onclick="add('https://pngimg.com/d/grape_PNG2993.png',60)">إضافة</button>
</div>

<div class="card">
<h3>🎁 تغليف فاخر</h3>
<button onclick="wrap()">اختيار تغليف</button>
</div>

</div>

<!-- RIGHT -->
<div>

<div class="stage">

<div class="box" id="box">

<div class="lid"></div>

<div class="inside" id="inside"></div>

<img id="wrapImg" class="wrap">

</div>

</div>

<div class="cart">
💰 الإجمالي: <span id="total">0</span> جنيه
</div>

<button class="checkout" onclick="order()">
اطلب الآن على واتساب 📲
</button>

</div>

</div>

<script>

let total = 0;

function add(img,price){

let f = document.createElement("img");
f.src = img;

document.getElementById("inside").appendChild(f);

total += price;
update();

document.getElementById("box").classList.add("open");
}

function wrap(){

document.getElementById("wrapImg").src =
"https://pngimg.com/d/gift_PNG5953.png";

total += 120;
update();
}

function update(){
document.getElementById("total").innerText = total;
}

function order(){

let msg = "🛒 طلب جديد من Build Your Box:%0A";
msg += "الإجمالي: " + total + " جنيه";

let phone = "201279468804";

window.open(`https://wa.me/${phone}?text=${msg}`, "_blank");
}

</script>

</body>
</html>
