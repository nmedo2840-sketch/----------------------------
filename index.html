<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FRUZO AI | Luxury Experience</title>

<style>

body{
margin:0;
font-family:Arial;
background:#070707;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
radial-gradient(circle at top,#ff4d6d33,transparent 40%),
radial-gradient(circle at bottom,#00ffd533,transparent 40%);
}

.hero h1{
font-size:60px;
margin:0;
}

.hero p{
opacity:.7;
margin-top:10px;
}

.btn{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#ff5f7e,#ff9966);
color:white;
font-weight:bold;
cursor:pointer;
}

/* PRODUCTS */

.section{
padding:60px 20px;
}

.title{
text-align:center;
font-size:40px;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#141414;
border-radius:20px;
overflow:hidden;
transform:translateY(30px);
opacity:0;
animation:fadeUp .8s forwards;
}

@keyframes fadeUp{
to{
transform:translateY(0);
opacity:1;
}
}

.card img{
width:100%;
height:180px;
object-fit:cover;
transition:.4s;
}

.card:hover img{
transform:scale(1.1);
}

.card-content{
padding:15px;
}

.price{
color:#ffd166;
font-weight:bold;
}

.add{
width:100%;
padding:10px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#00ffd5,#00b4ff);
color:white;
cursor:pointer;
margin-top:10px;
}

/* CART BAR */

.cartBar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter:blur(10px);
border-top:1px solid #333;
}

.checkout{
padding:10px 20px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff5f7e,#ff9966);
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>🍓 اصنع بوكسك الفاخر</h1>
<p>Luxury Fruit Experience — Delivered in Style</p>
<button class="btn" onclick="scrollToProducts()">ابدأ التجربة</button>
</div>

<!-- PRODUCTS -->
<div class="section" id="products">

<h2 class="title">اختار بوكسك</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1464965911861-746a04b4bca6">
<div class="card-content">
<h3>فراولة</h3>
<div class="price">45 جنيه</div>
<button class="add" onclick="add('فراولة',45)">إضافة</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1553279768-865429fa0078">
<div class="card-content">
<h3>مانجو</h3>
<div class="price">55 جنيه</div>
<button class="add" onclick="add('مانجو',55)">إضافة</button>
</div>
</div>

</div>

</div>

<!-- CART -->
<div class="cartBar">

<div>
🛒 السلة: <span id="count">0</span> | 💰 <span id="total">0</span> جنيه
</div>

<button class="checkout" onclick="checkout()">اطلب الآن</button>

</div>

<script>

let cart=[];
let total=0;

function scrollToProducts(){
document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

function add(name,price){

cart.push({name,price});
total+=price;

document.getElementById("count").innerText=cart.length;
document.getElementById("total").innerText=total;
}

function checkout(){

if(cart.length===0){
alert("اختار منتجات الأول 🍓");
return;
}

let msg="🛒 طلب جديد:%0A";
cart.forEach(p=>{
msg+=`- ${p.name} ${p.price} جنيه%0A`;
});

msg+=`%0Aالإجمالي: ${total}`;

window.open(
`https://wa.me/201279468804?text=${msg}`,
"_blank"
);

}

</script>

</body>
</html>
